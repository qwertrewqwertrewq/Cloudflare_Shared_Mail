name = "cfmail-worker"
main = "src/worker.ts"
compatibility_date = "2026-03-16"
workers_dev = true

[observability]
enabled = true

[[kv_namespaces]]
binding = "MAIL_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[[r2_buckets]]
binding = "MAIL_R2"
bucket_name = "cfmail-mailbox"

[triggers]
crons = ["*/30 * * * *"]

[vars]
API_BASE_URL = "https://cfmail-worker.<your-subdomain>.workers.dev"
PAGES_BASE_URL = "https://<your-pages-domain>"
FRONTEND_ORIGIN = "https://<your-pages-domain>"
TURNSTILE_SITE_KEY = ""

# Secrets should be set by `wrangler secret put`:
# ADMIN_SECRET
# SESSION_SIGNING_KEY
# TURNSTILE_SECRET
# CF_API_TOKEN
# CF_ACCOUNT_ID
# CF_ZONE_ID
